<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>EVフィルター（かり仕様）</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    /* ===== ベース ===== */
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      background: #f5f5f5;
      color: #222;
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
      padding: 16px;
      padding-bottom: 140px;
      box-sizing: border-box;
    }

    h2 {
      font-size: 20px;
      font-weight: 700;
      margin: 0 0 8px;
    }

    .section {
      margin-bottom: 24px;
    }

    /* ===== カード ===== */
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      padding: 20px;
      box-sizing: border-box;
    }

    /* ===== ステータスカード ===== */
    .status-row {
      font-size: 16px;
      margin-bottom: 4px;
    }
    .status-step { color: #007aff; font-weight: 700; }
    .status-loss { color: #ff3b30; font-weight: 700; }
    .status-next-bet { font-size: 20px; font-weight: 700; }
    .status-unit { color: #666; }

    /* ===== ボタン共通 ===== */
    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      border: 1px solid #000;
      background: #fff;
      color: #000;
      font-size: 18px;
      font-weight: 700;
      height: 50px;
      padding: 0 8px;
      box-sizing: border-box;
      cursor: pointer;
      transition: 0.1s ease;
      user-select: none;
    }

    .btn:active { transform: scale(0.95); }
    .btn.selected {
      background: #007aff;
      color: #fff;
      border-color: #007aff;
    }

    .race-btn { width: 60px; }

    /* ===== オッズ ===== */
    .odds-scroll {
      display: flex;
      overflow-x: auto;
      gap: 10px;
      padding-bottom: 4px;
    }

    .odds-btn {
      min-width: 60px;
      height: 50px;
      border-radius: 8px;
      border: 2px solid #000;
      background: #fff;
      font-size: 18px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.1s ease;
    }

    .odds-btn:active { transform: scale(0.95); }
    .odds-green { border-color: #34c759; }
    .odds-red { border-color: #ff3b30; }
    .odds-btn.selected {
      background: #007aff;
      color: #fff;
      border-color: #007aff;
    }

    /* ===== 購入カード ===== */
    .purchase-bar {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      background: #fff;
      box-shadow: 0 -2px 8px rgba(0,0,0,0.15);
    }

    .purchase-inner {
      max-width: 480px;
      margin: 0 auto;
      padding: 16px 16px 12px;
      box-sizing: border-box;
    }

    .purchase-amount {
      background: #ffcc00;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 26px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 16px;
    }

    .purchase-button {
      width: 100%;
      height: 56px;
      border-radius: 12px;
      border: none;
      background: #34c759;
      color: #fff;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.1s ease;
    }

    .purchase-button:active {
      transform: scale(0.96);
      opacity: 0.9;
    }

    /* ===== 判定 ===== */
    .judge {
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      margin-top: 8px;
    }
    .judge.ok { color: #34c759; }
    .judge.ng { color: #ff3b30; }

    /* ===== 勝ち負けボタン ===== */
    .win-btn {
      background: #34c759;
      color: #fff;
      border-color: #34c759;
    }
    .lose-btn {
      background: #ff3b30;
      color: #fff;
      border-color: #ff3b30;
    }
  </style>
</head>

<body>
  <div class="app">

    <!-- 会場 -->
    <div class="section">
      <h2>会場</h2>
      <div class="btn-row" id="venueContainer"></div>
    </div>

    <!-- ステータス -->
    <div class="section">
      <h2>ステータス</h2>
      <div class="card">
        <div class="status-row">会場：<strong id="statusCourse">阪神</strong></div>
        <div class="status-row">ステップ：<span class="status-step" id="statusStep">1 / 6</span></div>
        <div class="status-row">連敗数：<span class="status-loss" id="statusLoss">0</span></div>
        <div class="status-row">次の賭け金：<span class="status-next-bet" id="statusNextBet">100円</span></div>
        <div class="status-row status-unit">ユニット：<span id="statusUnit">100円</span></div>
      </div>
    </div>

    <!-- レース番号 -->
    <div class="section">
      <h2>レース番号</h2>
      <div class="btn-row" id="raceContainer"></div>
    </div>

    <!-- オッズ -->
    <div class="section">
      <h2>オッズ候補</h2>
      <div class="odds-scroll" id="oddsContainer"></div>
    </div>

    <!-- ユニット -->
    <div class="section">
      <h2>ユニット</h2>
      <div class="btn-row" id="unitContainer"></div>
    </div>

    <!-- 賭け金 -->
    <div class="section">
      <h2>賭け金候補（ココモ本番）</h2>
      <div class="btn-row" id="betContainer"></div>
      <div class="judge" id="judgeText">判定待ち</div>
    </div>

    <!-- 勝ち負け -->
    <div class="section">
      <h2>結果入力</h2>
      <div class="btn-row">
        <button class="btn win-btn" id="winButton">勝ち</button>
        <button class="btn lose-btn" id="loseButton">負け</button>
      </div>
    </div>

  </div>

  <!-- 購入カード -->
  <div class="purchase-bar">
    <div class="purchase-inner">
      <div class="purchase-amount" id="purchaseAmount">100円</div>
      <button class="purchase-button" id="purchaseButton">IPATへ</button>
    </div>
  </div>

  <script>
    /* ===== 状態 ===== */
    const state = {
      course: "阪神",
      step: 1,
      lossCount: 0,
      unit: 100,
      odds: null,
      selectedRace: null,
      selectedBet: 100
    };

    /* ===== ココモ本番シーケンス ===== */
    const kokomo = [100, 100, 200, 300, 500, 800];

    /* ===== DOM ===== */
    const statusCourse = document.getElementById("statusCourse");
    const statusStep = document.getElementById("statusStep");
    const statusLoss = document.getElementById("statusLoss");
    const statusNextBet = document.getElementById("statusNextBet");
    const statusUnit = document.getElementById("statusUnit");
    const purchaseAmount = document.getElementById("purchaseAmount");

    const venueContainer = document.getElementById("venueContainer");
    const raceContainer = document.getElementById("raceContainer");
    const oddsContainer = document.getElementById("oddsContainer");
    const unitContainer = document.getElementById("unitContainer");
    const betContainer = document.getElementById("betContainer");
    const judgeText = document.getElementById("judgeText");

    const winButton = document.getElementById("winButton");
    const loseButton = document.getElementById("loseButton");
    const purchaseButton = document.getElementById("purchaseButton");

    /* ===== ユニット保存 ===== */
    const UNIT_KEY = "kari_ev_unit";

    function loadUnit() {
      const saved = localStorage.getItem(UNIT_KEY);
      if (saved) {
        const v = parseInt(saved, 10);
        if (!isNaN(v)) state.unit = v;
      }
    }
    function saveUnit() {
      localStorage.setItem(UNIT_KEY, String(state.unit));
    }

    /* ===== ステータス更新 ===== */
    function updateStatus() {
      statusCourse.textContent = state.course;
      statusStep.textContent = `${state.step} / 6`;
      statusLoss.textContent = state.lossCount;
      statusUnit.textContent = `${state.unit}円`;

      const nextBet = kokomo[state.step - 1];
      statusNextBet.textContent = `${nextBet}円`;

      purchaseAmount.textContent = `${state.selectedBet}円`;
    }

    /* ===== 会場 ===== */
    function initVenues() {
      const venues = ["東京", "中山", "京都", "阪神"];

      venues.forEach(v => {
        const btn = document.createElement("button");
        btn.className = "btn";
        btn.textContent = v;
        btn.dataset.venue = v;

        btn.addEventListener("click", () => {
          state.course = v;
          updateVenueSelection();
          updateStatus();
        });

        venueContainer.appendChild(btn);
      });

      updateVenueSelection();
    }

    function updateVenueSelection() {
      const buttons = venueContainer.querySelectorAll(".btn");
      buttons.forEach(btn => {
        btn.classList.toggle("selected", btn.dataset.venue === state.course);
      });
    }

    /* ===== レース番号 ===== */
    function initRaces() {
      for (let i = 1; i <= 12; i++) {
        const btn = document.createElement("button");
        btn.className = "btn race-btn";
        btn.textContent = `${i}R`;
        btn.dataset.race = i;

        btn.addEventListener("click", () => {
          state.selectedRace = i;
          updateRaceSelection();
        });

        raceContainer.appendChild(btn);
      }
    }

    function updateRaceSelection() {
      const buttons = raceContainer.querySelectorAll(".race-btn");
      buttons.forEach(btn => {
        btn.classList.toggle("selected", Number(btn.dataset.race) === state.selectedRace);
      });
    }

    /* ===== オッズ ===== */
    function initOdds() {
      for (let v = 2.7; v <= 5.0; v += 0.1) {
        const value = Math.round(v * 10) / 10;
        const btn = document.createElement("button");
        btn.className = "odds-btn";
        btn.textContent = value.toFixed(1);
        btn.dataset.odds = value;

        if (value >= 2.7 && value <= 3.4) btn.classList.add("odds-green");
        if (value >= 3.5 && value <= 5.0) btn.classList.add("odds-red");

        btn.addEventListener("click", () => {
          state.odds = value;
          updateOddsSelection();
          updateJudge();
        });

        oddsContainer.appendChild(btn);
      }
    }

    function updateOddsSelection() {
      const buttons = oddsContainer.querySelectorAll(".odds-btn");
      buttons.forEach(btn => {
        btn.classList.toggle("selected", Number(btn.dataset.odds) === state.odds);
      });
    }

    /* ===== ユニット ===== */
    function initUnits() {
      const units = [100, 150, 200, 300, 500, 1000];

      units.forEach(u => {
        const btn = document.createElement("button");
        btn.className = "btn";
        btn.textContent = `${u}円`;
        btn.dataset.unit = u;

        btn.addEventListener("click", () => {
          state.unit = u;
          saveUnit();
          updateUnitSelection();
          updateStatus();
        });

        unitContainer.appendChild(btn);
      });

      updateUnitSelection();
    }

    function updateUnitSelection() {
      const buttons = unitContainer.querySelectorAll(".btn");
      buttons.forEach(btn => {
        btn.classList.toggle("selected", Number(btn.dataset.unit) === state.unit);
      });
    }

    /* ===== 賭け金（ココモ固定） ===== */
    function initBets() {
      updateBets();
    }

    function updateBets() {
      betContainer.innerHTML = "";

      kokomo.forEach((amount, index) => {
        const btn = document.createElement("button");
        btn.className = "btn";
        btn.textContent = `${amount}円`;
        btn.dataset.amount = amount;
        btn.dataset.step = index + 1;

        btn.addEventListener("click", () => {
          state.selectedBet = amount;
          state.step = index + 1;
          updateBetSelection();
          updateStatus();
        });

        betContainer.appendChild(btn);
      });

      updateBetSelection();
    }

    function updateBetSelection() {
      const buttons = betContainer.querySelectorAll(".btn");
      buttons.forEach(btn => {
        btn.classList.toggle("selected", Number(btn.dataset.amount) === state.selectedBet);
      });
    }

    /* ===== 判定 ===== */
    function updateJudge() {
      if (!state.odds) {
        judgeText.textContent = "判定待ち";
        judgeText.className = "judge";
        return;
      }

      if (state.odds >= 2.7 && state.odds <= 3.4) {
        judgeText.textContent = "OK（買い時）";
        judgeText.className = "judge ok";
      } else {
        judgeText.textContent = "注意（オッズ高め）";
        judgeText.className = "judge ng";
      }
    }

    /* ===== 勝ち負け処理（本番ココモ） ===== */
    function onWin() {
      state.step = 1;
      state.lossCount = 0;
      state.selectedBet = kokomo[0];
      updateStatus();
      updateBetSelection();
      alert("勝ち → ココモリセット");
    }

    function onLose() {
      state.lossCount++;

      if (state.lossCount >= 6) {
        alert("6連敗 → ココモ停止（損失2,000円）");
        state.step = 1;
        state.lossCount = 0;
        state.selectedBet = kokomo[0];
        updateStatus();
        updateBetSelection();
        return;
      }

      state.step = state.lossCount + 1;
      state.selectedBet = kokomo[state.step - 1];
      updateStatus();
      updateBetSelection();
    }

    winButton.addEventListener("click", onWin);
    loseButton.addEventListener("click", onLose);

    /* ===== IPAT遷移 ===== */
    purchaseButton.addEventListener("click", () => {
      window.location.href = "https://www.ipat.jra.go.jp/";
    });

    /* ===== 初期化 ===== */
    function init() {
      loadUnit();
      initVenues();
      initRaces();
      initOdds();
      initUnits();
      initBets();
      updateStatus();
      updateJudge();
    }

    init();
  </script>
</body>
</html>
