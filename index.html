<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>2ndフェイバリット・ココモ運用</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
    button { padding: 10px 20px; margin: 5px; font-size: 18px; }
    section { margin-bottom: 25px; }
    #buyBtn { background: #28a745; color: white; border: none; border-radius: 6px; }
    .venue-btn { background: #007bff; color: white; border: none; border-radius: 6px; }
    .unit-btn, .race-btn, .odds-btn, .bet-btn {
      background: #444; color: white; border: none; border-radius: 6px;
    }
  </style>
</head>
<body>

  <h1>2ndフェイバリット・ココモ運用パネル</h1>

  <!-- 会場選択 -->
  <section>
    <h2>会場</h2>
    <button class="venue-btn" data-venue="tokyo">東京</button>
    <button class="venue-btn" data-venue="kyoto">京都</button>
  </section>

  <!-- 初期ユニット選択 -->
  <section>
    <h3>初期ユニット（賭け金）</h3>
    <div id="unitButtons"></div>
  </section>

  <!-- ステータス -->
  <section>
    <h2>現在のステータス</h2>
    <div id="status"></div>
  </section>

  <!-- レース番号 -->
  <section>
    <h3>レース番号</h3>
    <div id="raceButtons"></div>
  </section>

  <!-- オッズ入力 -->
  <section>
    <h2>レース情報</h2>
    <label>
      2番人気オッズ:
      <input type="number" id="odds" step="0.1">
    </label>
    <br>
    <button id="checkBtn">条件判定</button>
  </section>

  <!-- オッズ候補 -->
  <section>
    <h3>オッズ候補</h3>
    <div id="oddsButtons">
      <button class="odds-btn" data-odds="2.7">2.7</button>
      <button class="odds-btn" data-odds="2.8">2.8</button>
      <button class="odds-btn" data-odds="2.9">2.9</button>
      <button class="odds-btn" data-odds="3.0">3.0</button>
      <button class="odds-btn" data-odds="3.1">3.1</button>
      <button class="odds-btn" data-odds="3.2">3.2</button>
      <button class="odds-btn" data-odds="3.3">3.3</button>
      <button class="odds-btn" data-odds="3.4">3.4</button>
    </div>
  </section>

  <!-- 判定結果 -->
  <section>
    <h2>判定結果</h2>
    <div id="judge"></div>
    <button id="copyBetBtn">賭け金をコピー</button>
  </section>

  <!-- 購入ボタン -->
  <section>
    <button id="buyBtn" style="display:none;">購入へ</button>
  </section>

  <!-- レース結果 -->
  <section>
    <h2>レース結果</h2>
    <button id="winBtn">的中</button>
    <button id="loseBtn">ハズレ</button>
  </section>

  <script src="app.js"></script>
</body>
</html>
