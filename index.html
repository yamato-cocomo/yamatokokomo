<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>EVフィルター（かり仕様）</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    /* ===== ベース ===== */
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      background: #f5f5f5;
      color: #222;
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
      padding: 16px;
      padding-bottom: 120px; /* 下の購入カード分の余白 */
      box-sizing: border-box;
    }

    h2 {
      font-size: 20px;
      font-weight: 700;
      margin: 0 0 8px;
    }

    .section {
      margin-bottom: 24px;
    }

    /* ===== カード共通 ===== */
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      padding: 20px;
      box-sizing: border-box;
    }

    /* ===== ステータスカード ===== */
    .status-row {
      font-size: 16px;
      margin-bottom: 4px;
    }
    .status-row strong {
      font-weight: 700;
    }
    .status-step {
      color: #007aff; /* 青 */
      font-weight: 700;
    }
    .status-loss {
      color: #ff3b30; /* 赤 */
      font-weight: 700;
    }
    .status-next-bet {
      font-size: 20px;
      font-weight: 700;
    }
    .status-unit {
      color: #666;
      font-size: 16px;
    }

    /* ===== ボタン共通 ===== */
    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      border: 1px solid #000;
      background: #fff;
      color: #000;
      font-size: 18px;
      font-weight: 700;
      height: 50px;
      padding: 0 8px;
      box-sizing: border-box;
      cursor: pointer;
      transition: transform 0.1s ease, background-color 0.1s ease, color 0.1s ease, border-color 0.1s ease;
      user-select: none;
    }

    .btn:active {
      transform: scale(0.95);
    }

    .btn.selected {
      background: #007aff; /* 青 */
      color: #fff;
      border-color: #007aff;
    }

    /* ===== レース番号 ===== */
    .race-btn {
      width: 60px;
    }

    /* ===== オッズ候補（横スクロール） ===== */
    .odds-scroll {
      display: flex;
      overflow-x: auto;
      gap: 10px;
      padding-bottom: 4px;
    }

    .odds-btn {
      min-width: 60px;
      height: 50px;
      border-radius: 8px;
      border: 2px solid #000;
      background: #fff;
      font-size: 18px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
      cursor: pointer;
      transition: transform 0.1s ease, background-color 0.1s ease, color 0.1s ease, border-color 0.1s ease;
      user-select: none;
    }

    .odds-btn:active {
      transform: scale(0.95);
    }

    /* 緑枠（2.7〜3.4） */
    .odds-green {
      border-color: #34c759;
    }

    /* 赤枠（3.5〜5.0） */
    .odds-red {
      border-color: #ff3b30;
    }

    .odds-btn.selected {
      background: #007aff;
      color: #fff;
      border-color: #007aff;
    }

    /* ===== ユニットボタン ===== */
    .unit-btn {
      min-width: 70px;
    }

    /* ===== 賭け金候補 ===== */
    .bet-btn {
      min-width: 90px;
    }

    /* ===== 購入カード（下固定） ===== */
    .purchase-bar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      background: #fff;
      box-shadow: 0 -2px 8px rgba(0,0,0,0.15);
    }

    .purchase-inner {
      max-width: 480px;
      margin: 0 auto;
      padding: 16px 16px 12px;
      box-sizing: border-box;
    }

    .purchase-amount {
      background: #ffcc00; /* 黄色 */
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 26px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 16px;
    }

    .purchase-button {
      width: 100%;
      height: 56px;
      border-radius: 12px;
      border: none;
      background: #34c759; /* 緑 */
      color: #fff;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.1s ease, opacity 0.1s ease;
    }

    .purchase-button:active {
      transform: scale(0.96);
      opacity: 0.9;
    }

    /* ===== 判定結果（シンプル版） ===== */
    .judge {
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      margin-top: 8px;
    }
    .judge.ok {
      color: #34c759;
    }
    .judge.ng {
      color: #ff3b30;
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- ステータスカード -->
    <div class="section">
      <h2>ステータス</h2>
      <div class="card" id="statusCard">
        <div class="status-row">会場：<strong id="statusCourse">阪神</strong></div>
        <div class="status-row">ステップ：<span class="status-step" id="statusStep">1 / 6</span></div>
        <div class="status-row">連敗数：<span class="status-loss" id="statusLoss">0</span></div>
        <div class="status-row">次の賭け金：<span class="status-next-bet" id="statusNextBet">100円</span></div>
        <div class="status-row status-unit">ユニット：<span id="statusUnit">100円</span></div>
      </div>
    </div>

    <!-- レース番号 -->
    <div class="section">
      <h2>レース番号</h2>
      <div class="btn-row" id="raceContainer">
        <!-- 1R〜12R をJSで生成 -->
      </div>
    </div>

    <!-- オッズ候補 -->
    <div class="section">
      <h2>オッズ候補</h2>
      <div class="odds-scroll" id="oddsContainer">
        <!-- 2.7〜5.0 をJSで生成 -->
      </div>
    </div>

    <!-- ユニット選択 -->
    <div class="section">
      <h2>ユニット</h2>
      <div class="btn-row" id="unitContainer">
        <!-- 100 / 150 / 200 / 300 / 500 などをJSで生成 -->
      </div>
    </div>

    <!-- 賭け金候補（ココモ） -->
    <div class="section">
      <h2>賭け金候補</h2>
      <div class="btn-row" id="betContainer">
        <!-- ユニットから自動計算 -->
      </div>
      <div class="judge" id="judgeText">判定待ち</div>
    </div>
  </div>

  <!-- 購入カード（下固定） -->
  <div class="purchase-bar">
    <div class="purchase-inner">
      <div class="purchase-amount" id="purchaseAmount">0円</div>
      <button class="purchase-button" id="purchaseButton">購入する</button>
    </div>
  </div>

  <script>
    // ===== グローバル状態 =====
    const state = {
      course: "阪神",
      step: 1,
      maxStep: 6,
      lossCount: 0,
      unit: 100,
      odds: null,
      selectedRace: null,
      selectedBet: null
    };

    // ===== DOM取得 =====
    const statusCourse = document.getElementById("statusCourse");
    const statusStep = document.getElementById("statusStep");
    const statusLoss = document.getElementById("statusLoss");
    const statusNextBet = document.getElementById("statusNextBet");
    const statusUnit = document.getElementById("statusUnit");

    const raceContainer = document.getElementById("raceContainer");
    const oddsContainer = document.getElementById("oddsContainer");
    const unitContainer = document.getElementById("unitContainer");
    const betContainer = document.getElementById("betContainer");

    const judgeText = document.getElementById("judgeText");
    const purchaseAmount = document.getElementById("purchaseAmount");
    const purchaseButton = document.getElementById("purchaseButton");

    // ===== ユニット保存（localStorage） =====
    const UNIT_KEY = "kari_ev_unit";

    function loadUnit() {
      const saved = localStorage.getItem(UNIT_KEY);
      if (saved) {
        const v = parseInt(saved, 10);
        if (!isNaN(v)) {
          state.unit = v;
        }
      }
    }

    function saveUnit() {
      localStorage.setItem(UNIT_KEY, String(state.unit));
    }

    // ===== ステータス更新 =====
    function updateStatus() {
      statusCourse.textContent = state.course;
      statusStep.textContent = `${state.step} / ${state.maxStep}`;
      statusLoss.textContent = state.lossCount;
      statusUnit.textContent = `${state.unit}円`;

      // 次の賭け金（ここでは単純に「ユニット × ステップ」の例）
      const nextBet = state.unit * state.step;
      statusNextBet.textContent = `${nextBet}円`;

      // 購入金額表示も更新（選択中の賭け金があればそれを優先）
      const amount = state.selectedBet || nextBet;
      purchaseAmount.textContent = `${amount}円`;
    }

    // ===== レース番号生成 =====
    function initRaces() {
      for (let i = 1; i <= 12; i++) {
        const btn = document.createElement("button");
        btn.className = "btn race-btn";
        btn.textContent = `${i}R`;
        btn.dataset.race = i;

        btn.addEventListener("click", () => {
          state.selectedRace = i;
          updateRaceSelection();
        });

        raceContainer.appendChild(btn);
      }
    }

    function updateRaceSelection() {
      const buttons = raceContainer.querySelectorAll(".race-btn");
      buttons.forEach(btn => {
        const r = parseInt(btn.dataset.race, 10);
        if (r === state.selectedRace) {
          btn.classList.add("selected");
        } else {
          btn.classList.remove("selected");
        }
      });
    }

    // ===== オッズ候補生成（2.7〜5.0） =====
    function initOdds() {
      const start = 2.7;
      const end = 5.0;
      const step = 0.1;

      for (let v = start; v <= end + 0.0001; v += step) {
        const value = Math.round(v * 10) / 10; // 小数1桁
        const btn = document.createElement("button");
        btn.className = "odds-btn";
        btn.textContent = value.toFixed(1);
        btn.dataset.odds = value.toFixed(1);

        // 色分け（2段階）
        if (value >= 2.7 && value <= 3.4) {
          btn.classList.add("odds-green"); // 緑枠
        } else if (value >= 3.5 && value <= 5.0) {
          btn.classList.add("odds-red"); // 赤枠
        }

        btn.addEventListener("click", () => {
          state.odds = value;
          updateOddsSelection();
          updateJudge();
        });

        oddsContainer.appendChild(btn);
      }
    }

    function updateOddsSelection() {
      const buttons = oddsContainer.querySelectorAll(".odds-btn");
      buttons.forEach(btn => {
        const o = parseFloat(btn.dataset.odds);
        if (o === state.odds) {
          btn.classList.add("selected");
        } else {
          btn.classList.remove("selected");
        }
      });
    }

    // ===== ユニットボタン生成 =====
    function initUnits() {
      const units = [100, 150, 200, 300, 500, 1000];

      units.forEach(u => {
        const btn = document.createElement("button");
        btn.className = "btn unit-btn";
        btn.textContent = `${u}円`;
        btn.dataset.unit = u;

        btn.addEventListener("click", () => {
          state.unit = u;
          saveUnit();
          updateUnitSelection();
          updateBets();
          updateStatus();
        });

        unitContainer.appendChild(btn);
      });

      updateUnitSelection();
    }

    function updateUnitSelection() {
      const buttons = unitContainer.querySelectorAll(".unit-btn");
      buttons.forEach(btn => {
        const u = parseInt(btn.dataset.unit, 10);
        if (u === state.unit) {
          btn.classList.add("selected");
        } else {
          btn.classList.remove("selected");
        }
      });
    }

    // ===== 賭け金候補（簡易ココモ例） =====
    function initBets() {
      updateBets();
    }

    function updateBets() {
      betContainer.innerHTML = "";
      const base = state.unit;
      // 例：単純に 1〜6ステップ分を生成
      const steps = [1, 2, 3, 5, 8, 13]; // 適当な例（本番はかりのロジックに差し替え可）

      steps.forEach((s, index) => {
        const amount = base * s;
        const btn = document.createElement("button");
        btn.className = "btn bet-btn";
        btn.textContent = `${amount}円`;
        btn.dataset.amount = amount;
        btn.dataset.step = index + 1;

        btn.addEventListener("click", () => {
          state.selectedBet = amount;
          state.step = index + 1;
          updateBetSelection();
          updateStatus();
        });

        betContainer.appendChild(btn);
      });

      updateBetSelection();
    }

    function updateBetSelection() {
      const buttons = betContainer.querySelectorAll(".bet-btn");
      buttons.forEach(btn => {
        const a = parseInt(btn.dataset.amount, 10);
        if (a === state.selectedBet) {
          btn.classList.add("selected");
        } else {
          btn.classList.remove("selected");
        }
      });
    }

    // ===== 判定（超シンプル例：オッズが2.7〜3.4ならOK） =====
    function updateJudge() {
      if (!state.odds) {
        judgeText.textContent = "判定待ち";
        judgeText.className = "judge";
        return;
      }

      if (state.odds >= 2.7 && state.odds <= 3.4) {
        judgeText.textContent = "OK（買い時）";
        judgeText.className = "judge ok";
      } else {
        judgeText.textContent = "注意（オッズ高め）";
        judgeText.className = "judge ng";
      }
    }

    // ===== 購入ボタン =====
    purchaseButton.addEventListener("click", () => {
      const amount = state.selectedBet || state.unit * state.step;
      alert(`購入金額：${amount}円\nレース：${state.selectedRace || "-"}R\nオッズ：${state.odds || "-"}\n（ここでIPATにコピペ）`);
    });

    // ===== 初期化 =====
    function init() {
      loadUnit();
      initRaces();
      initOdds();
      initUnits();
      initBets();
      updateStatus();
      updateJudge();
    }

    init();
  </script>
</body>
</html>
