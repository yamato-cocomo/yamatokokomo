<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>EVフィルター（かり仕様）</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      background: #f5f5f5;
      color: #222;
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
      padding: 16px;
      padding-bottom: 140px;
      box-sizing: border-box;
    }

    h2 {
      font-size: 20px;
      font-weight: 700;
      margin: 0 0 8px;
    }

    .section { margin-bottom: 24px; }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      padding: 20px;
      box-sizing: border-box;
    }

    .status-row { font-size: 16px; margin-bottom: 4px; }
    .status-step { color: #007aff; font-weight: 700; }
    .status-loss { color: #ff3b30; font-weight: 700; }
    .status-next-bet { font-size: 20px; font-weight: 700; }
    .status-unit { color: #666; }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      border: 1px solid #000;
      background: #fff;
      color: #000;
      font-size: 18px;
      font-weight: 700;
      height: 50px;
      padding: 0 8px;
      box-sizing: border-box;
      cursor: pointer;
      transition: 0.1s ease;
      user-select: none;
    }

    .btn:active { transform: scale(0.95); }
    .btn.selected { background: #007aff; color: #fff; border-color: #007aff; }

    .race-btn { width: 60px; }

    .odds-scroll {
      display: flex;
      overflow-x: auto;
      gap: 10px;
      padding-bottom: 4px;
    }

    .odds-btn {
      min-width: 60px;
      height: 50px;
      border-radius: 8px;
      border: 2px solid #000;
      background: #fff;
      font-size: 18px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.1s ease;
    }

    .odds-btn:active { transform: scale(0.95); }
    .odds-green { border-color: #34c759; }
    .odds-red { border-color: #ff3b30; }
    .odds-btn.selected { background: #007aff; color: #fff; border-color: #007aff; }

    .purchase-bar {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      background: #fff;
      box-shadow: 0 -2px 8px rgba(0,0,0,0.15);
    }

    .purchase-inner {
      max-width: 480px;
      margin: 0 auto;
      padding: 16px 16px 12px;
      box-sizing: border-box;
    }

    .purchase-amount {
      background: #ffcc00;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 26px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 16px;
    }

    .purchase-button {
      width: 100%;
      height: 56px;
      border-radius: 12px;
      border: none;
      background: #34c759;
      color: #fff;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.1s ease;
    }

    .purchase-button:active { transform: scale(0.96); opacity: 0.9; }

    .judge { font-size: 22px; font-weight: 700; text-align: center; margin-top: 8px; }
    .judge.ok { color: #34c759; }
    .judge.ng { color: #ff3b30; }

    .win-btn { background: #34c759; color: #fff; border-color: #34c759; }
    .lose-btn { background: #ff3b30; color: #fff; border-color: #ff3b30; }
  </style>
</head>

<body>
  <div class="app">
    <div class="section">
      <h2>会場</h2>
      <div class="btn-row" id="venueContainer"></div>
    </div>

    <div class="section">
      <h2>ステータス</h2>
      <div class="card">
        <div class="status-row">会場：<strong id="statusCourse">阪神</strong></div>
        <div class="status-row">ステップ：<span class="status-step" id="statusStep">1 / 6</span></div>
        <div class="status-row">連敗数：<span class="status-loss" id="statusLoss">0</span></div>
        <div class="status-row">次の賭け金：<span class="status-next-bet" id="statusNextBet">100円</span></div>
        <div class="status-row status-unit">ユニット：<span id="statusUnit">100円</span></div>
      </div>
    </div>

    <div class="section">
      <h2>レース番号</h2>
      <div class="btn-row" id="raceContainer"></div>
    </div>

    <div class="section">
      <h2>オッズ候補</h2>
      <div class="odds-scroll" id="oddsContainer"></div>
    </div>

    <div class="section">
      <h2>ユニット</h2>
      <div class="btn-row" id="unitContainer"></div>
    </div>

    <div class="section">
      <h2>賭け金候補（ココモ本番）</h2>
      <div class="btn-row" id="betContainer"></div>
      <div class="judge" id="judgeText">判定待ち</div>
    </div>

    <div class="section">
      <h2>結果入力</h2>
      <div class="btn-row">
        <button class="btn win-btn" id="winButton">勝ち</button>
        <button class="btn lose-btn" id="loseButton">負け</button>
      </div>
    </div>
  </div>

  <div class="purchase-bar">
    <div class="purchase-inner">
      <div class="purchase-amount" id="purchaseAmount">100円</div>
      <button class="purchase-button" id="purchaseButton">IPATへ</button>
    </div>
  </div>
